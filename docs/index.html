<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Crime Intelligence & Forecasting System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#060b12;color:#e2f0ff;font-family:'Inter',sans-serif;font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#0b1220}
::-webkit-scrollbar-thumb{background:#182840;border-radius:3px}
input[type=range]{accent-color:#00ffe7;width:100%;cursor:pointer}
.mono{font-family:'Space Mono',monospace}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #00ffe740}50%{box-shadow:0 0 20px #00ffe770}}
.tab-btn{background:transparent;border:1px solid #182840;color:#6b90b8;border-radius:8px;padding:7px 16px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'Space Mono',monospace;white-space:nowrap;transition:all .18s}
.tab-btn.active{background:#00ffe715;border-color:#00ffe7;color:#00ffe7;box-shadow:0 0 16px #00ffe715}
.card{background:#0f1a2e;border:1px solid #182840;border-radius:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;right:0;width:100px;height:100px;background:radial-gradient(circle at top right,var(--glow,#00ffe712),transparent 70%);pointer-events:none}
.kpi{border-top:2px solid var(--c,#00ffe7);padding:18px 20px;display:flex;flex-direction:column;gap:5px}
.risk-high{color:#ff4757}.risk-medium{color:#ffa502}.risk-low{color:#00ffe7}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:.1em;font-family:'Space Mono',monospace}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.upload-btn{display:flex;align-items:center;gap:7px;padding:5px 11px;border-radius:7px;cursor:pointer;border:1px dashed #182840;font-size:10px;color:#6b90b8;transition:all .2s;font-family:'Space Mono',monospace;white-space:nowrap;user-select:none}
.upload-btn.loaded{border-color:#00ffe7;background:#00ffe715;color:#00ffe7}
table{width:100%;border-collapse:collapse}
th{padding:7px 10px;text-align:left;font-size:9px;color:#344f6e;font-family:'Space Mono',monospace;letter-spacing:.12em;font-weight:600;border-bottom:1px solid #182840}
td{padding:9px 10px;border-bottom:1px solid #182840}
tr:hover td{background:#00ffe710}
.nav-tile{padding:16px 18px;border-left:3px solid var(--c);cursor:pointer;transition:all .2s}
.nav-tile:hover{background:#132040;box-shadow:0 0 20px #00000040}
canvas{max-width:100%}
</style>
</head>
<body>
<div id="root"></div>
<script>
const {createElement:h,useState,useEffect,useRef,useCallback,useMemo,Fragment} = React;

// ── Colours ──────────────────────────────────────────────────────────────────
const C={bg:"#060b12",surface:"#0b1220",card:"#0f1a2e",border:"#182840",
  accent:"#00ffe7",red:"#ff4757",amber:"#ffa502",blue:"#2979ff",purple:"#a855f7",
  textPrimary:"#e2f0ff",textSecondary:"#6b90b8",textMuted:"#344f6e"};
const riskCol=r=>{const s=(r||"").toLowerCase();return s.includes("high")?C.red:s.includes("med")?C.amber:C.accent};

// ── Data helpers ─────────────────────────────────────────────────────────────
const parseDailyCSV=rows=>rows.filter(r=>r.Date&&r.Crime_Count)
  .map(r=>({date:new Date(r.Date).toLocaleDateString("en-US",{month:"short",day:"numeric"}),rawDate:new Date(r.Date),count:Math.round(parseFloat(r.Crime_Count))}))
  .sort((a,b)=>a.rawDate-b.rawDate).slice(-90);

const parseIntelCSV=rows=>{
  const pts=rows.map(r=>({lat:parseFloat(r.Latitude),lon:parseFloat(r.Longitude),risk:(r.Risk_Level||"Low").trim(),zone:(r.District||r.Zone||r.Beat||"Unknown").trim()})).filter(r=>!isNaN(r.lat)&&!isNaN(r.lon));
  const g={};pts.forEach(p=>{if(!g[p.zone])g[p.zone]={zone:p.zone,lat:p.lat,lon:p.lon,count:0,rv:{}};g[p.zone].count++;g[p.zone].rv[p.risk]=(g[p.zone].rv[p.risk]||0)+1;});
  const zones=Object.values(g).sort((a,b)=>b.count-a.count).slice(0,12).map((z,i)=>{const risk=Object.entries(z.rv).sort((a,b)=>b[1]-a[1])[0][0];return{id:i+1,zone:z.zone,lat:z.lat,lon:z.lon,risk,incidents:z.count};});
  return{points:pts.slice(0,3000),zones};
};
const parseHotCSV=rows=>rows.filter(r=>r.Cluster_ID!==undefined&&r.Crime_Count).map((r,i)=>({sr:i+1,cluster:`Cluster ${r.Cluster_ID}`,count:parseInt(r.Crime_Count),pct:parseFloat(r["Crime_Percentage (%)"]),risk:(r.Risk_Level||"Low Risk").trim(),lat:parseFloat(r.Centroid_Latitude),lon:parseFloat(r.Centroid_Longitude)})).filter(r=>!isNaN(r.lat));

const genDaily=()=>{const d=[];let b=320,now=new Date();for(let i=89;i>=0;i--){const dt=new Date(now);dt.setDate(dt.getDate()-i);b=Math.max(180,Math.min(520,b+Math.round((Math.random()-.48)*30)));d.push({date:dt.toLocaleDateString("en-US",{month:"short",day:"numeric"}),count:b});}return d;};
const genForecast=(days,last)=>{const a=[];let v=last;for(let i=1;i<=days;i++){v=Math.max(160,Math.min(550,v+Math.round((Math.random()-.48)*25)));a.push({day:`Day ${i}`,predicted:v,upper:Math.round(v*1.12),lower:Math.round(v*.88)});}return a;};

const DEF_ZONES=[
  {id:1,zone:"North Side",   lat:41.90,lon:-87.74,risk:"High",  incidents:412},
  {id:2,zone:"West Town",    lat:41.73,lon:-87.60,risk:"High",  incidents:387},
  {id:3,zone:"Austin",       lat:41.79,lon:-87.67,risk:"High",  incidents:356},
  {id:4,zone:"Logan Square", lat:41.85,lon:-87.65,risk:"Medium",incidents:221},
  {id:5,zone:"Lakeview",     lat:41.93,lon:-87.70,risk:"Medium",incidents:198},
  {id:6,zone:"Hyde Park",    lat:41.76,lon:-87.63,risk:"Medium",incidents:176},
  {id:7,zone:"Evanston",     lat:41.82,lon:-87.71,risk:"Low",   incidents:94},
  {id:8,zone:"Oak Park",     lat:41.88,lon:-87.68,risk:"Low",   incidents:78},
  {id:9,zone:"South Shore",  lat:41.71,lon:-87.62,risk:"Low",   incidents:61},
];
const DEF_PTS=DEF_ZONES.flatMap(z=>Array.from({length:Math.min(z.incidents,60)},()=>({lat:z.lat+(Math.random()-.5)*.08,lon:z.lon+(Math.random()-.5)*.08,risk:z.risk,zone:z.zone})));
const DEF_HOT=[
  {sr:1,cluster:"Cluster 3",count:52820,pct:27.42,risk:"High Risk",  lat:41.9046,lon:-87.7423},
  {sr:2,cluster:"Cluster 0",count:47968,pct:24.90,risk:"Medium Risk",lat:41.7349,lon:-87.6059},
  {sr:3,cluster:"Cluster 1",count:47499,pct:24.66,risk:"Medium Risk",lat:41.7946,lon:-87.6715},
  {sr:4,cluster:"Cluster 2",count:44355,pct:23.02,risk:"Low Risk",   lat:41.9266,lon:-87.6605},
];
const MODEL_DATA=[
  {model:"ARIMA",        rmse:106.97,color:"#ff6b6b",type:"Statistical"},
  {model:"SARIMA",       rmse:136.19,color:"#ff9f43",type:"Statistical"},
  {model:"Random Forest",rmse:48.31, color:"#00ffe7",type:"ML"},
  {model:"XGBoost",      rmse:49.13, color:"#54a0ff",type:"ML"},
];
const FEAT=[
  {label:"7-day Rolling Mean",v:34},{label:"Yesterday Count",v:27},
  {label:"Last Week Count",v:19},{label:"30-day Rolling Mean",v:11},
  {label:"Day of Week",v:5},{label:"Month",v:4},
];
const PIPE=[
  {week:"Week 1–2",icon:"🗺",title:"Spatial Intelligence",col:C.red,
   desc:"1.45M Chicago crime records cleaned and clustered using KMeans. Geographic risk zones (High/Medium/Low) identified.",
   tech:["KMeans Clustering","Outlier Removal","Risk Level Assignment","Centroid Extraction"],
   out:"crime_intelligence_dataset.csv + kmeans_hotspot_model.pkl"},
  {week:"Week 3",icon:"📈",title:"Statistical Forecasting",col:C.amber,
   desc:"Daily counts aggregated and tested for stationarity (ADF Test). ARIMA and SARIMA fitted and compared.",
   tech:["ADF Stationarity Test","Differencing","ARIMA(1,1,1)","SARIMA Seasonal"],
   out:"ARIMA RMSE: 106.97 | SARIMA RMSE: 136.19"},
  {week:"Week 4",icon:"🤖",title:"ML Forecasting",col:C.accent,
   desc:"Lag and rolling features engineered. Random Forest and XGBoost trained, beating statistical models by 55%.",
   tech:["Lag Features (1/7/30d)","Rolling Means","Random Forest","XGBoost"],
   out:"RF RMSE: 48.31 ✅ | XGB RMSE: 49.13 — final_forecast_model.pkl"},
  {week:"Week 5",icon:"🖥",title:"Dashboard Deployment",col:C.blue,
   desc:"Interactive Streamlit dashboard built with multi-day forecasting, spatial maps and model comparison.",
   tech:["Streamlit","Interactive Charts","Multi-day Forecast","Spatial Maps"],
   out:"Live at Streamlit Cloud"},
];

// ── Mini components ──────────────────────────────────────────────────────────
const div=(...args)=>h("div",...args);
const span=(...args)=>h("span",...args);
const p=(...args)=>h("p",...args);

function Mono({children,style={}}){return span({className:"mono",style},[children]);}
function SectionTitle({title,sub}){
  return div({style:{marginBottom:18}},[
    div({style:{display:"flex",alignItems:"center",gap:10}},[
      div({style:{width:3,height:18,background:C.accent,borderRadius:2,boxShadow:`0 0 8px ${C.accent}`}}),
      h("span",{className:"mono",style:{fontSize:12,fontWeight:700,color:C.textPrimary,letterSpacing:".12em",textTransform:"uppercase"}},title),
    ]),
    sub&&p({style:{fontSize:11,color:C.textSecondary,marginTop:5,marginLeft:13}},sub),
  ].filter(Boolean));
}
function RiskBadge({level}){
  const col=riskCol(level);
  return span({className:"badge",style:{color:col,background:col+"18",border:`1px solid ${col}40`}},(level||"").toUpperCase());
}
function AnimNum({target}){
  const [v,setV]=useState(0);
  useEffect(()=>{const s=performance.now();const tick=n=>{const t=Math.min((n-s)/1400,1);setV(Math.round((1-Math.pow(1-t,3))*target));if(t<1)requestAnimationFrame(tick);};requestAnimationFrame(tick);},[target]);
  return v.toLocaleString();
}
function UploadBtn({label,loaded,onLoad}){
  const ref=useRef();
  return div({className:"upload-btn"+(loaded?" loaded":""),onClick:()=>ref.current.click()},[
    h("input",{ref,type:"file",accept:".csv",style:{display:"none"},onChange:e=>{const f=e.target.files[0];if(!f)return;Papa.parse(f,{header:true,skipEmptyLines:true,complete:r=>onLoad(r.data)});}}),
    span({},[loaded?"✅":"📂"]),
    span({},[loaded?label+" ✓":"Upload "+label]),
  ]);
}

// ── Chart.js wrappers ────────────────────────────────────────────────────────
function LineChartComp({data,color=C.accent,label="Value",height=200}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current||!data.length)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"line",data:{labels:data.map(d=>d.date||d.day),datasets:[{label,data:data.map(d=>d.count||d.predicted),borderColor:color,backgroundColor:color+"28",fill:true,tension:.4,pointRadius:0,borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:"index",intersect:false,backgroundColor:C.surface,borderColor:C.border,borderWidth:1,titleColor:C.textPrimary,bodyColor:color}},scales:{x:{ticks:{color:C.textMuted,maxTicksLimit:8,font:{size:10}},grid:{color:C.border}},y:{ticks:{color:C.textMuted,font:{size:10}},grid:{color:C.border}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data,color,label]);
  return h("canvas",{ref,style:{height}});
}
function ForecastChart({actual,forecast,days,lastCount}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    const labels=[...actual.slice(-30).map(d=>d.date),...forecast.map(d=>d.day)];
    const actData=[...actual.slice(-30).map(d=>d.count),...Array(forecast.length).fill(null)];
    const fctData=[...Array(30).fill(null),...forecast.map(d=>d.predicted)];
    const upperData=[...Array(30).fill(null),...forecast.map(d=>d.upper)];
    const lowerData=[...Array(30).fill(null),...forecast.map(d=>d.lower)];
    chartRef.current=new Chart(ref.current,{type:"line",data:{labels,datasets:[
      {label:"Actual",data:actData,borderColor:C.accent,backgroundColor:C.accent+"20",fill:true,tension:.4,pointRadius:0,borderWidth:2},
      {label:"Forecast",data:fctData,borderColor:C.blue,backgroundColor:C.blue+"18",fill:true,tension:.4,pointRadius:3,borderWidth:2,borderDash:[0]},
      {label:"Upper CI",data:upperData,borderColor:C.blue+"60",backgroundColor:"transparent",fill:false,tension:.4,pointRadius:0,borderWidth:1,borderDash:[4,4]},
      {label:"Lower CI",data:lowerData,borderColor:C.blue+"60",backgroundColor:"transparent",fill:false,tension:.4,pointRadius:0,borderWidth:1,borderDash:[4,4]},
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:C.textSecondary,font:{size:10}}},tooltip:{mode:"index",intersect:false,backgroundColor:C.surface,borderColor:C.border,borderWidth:1,titleColor:C.textPrimary}},scales:{x:{ticks:{color:C.textMuted,maxTicksLimit:10,font:{size:10}},grid:{color:C.border}},y:{ticks:{color:C.textMuted,font:{size:10}},grid:{color:C.border}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[actual,forecast]);
  return h("canvas",{ref,style:{height:260}});
}
function BarChartComp({data}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"bar",data:{labels:data.map(d=>d.model),datasets:[{label:"RMSE",data:data.map(d=>d.rmse),backgroundColor:data.map(d=>d.color+"cc"),borderColor:data.map(d=>d.color),borderWidth:2,borderRadius:5}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:C.surface,borderColor:C.border,borderWidth:1,titleColor:C.textPrimary,bodyColor:C.textSecondary}},scales:{x:{ticks:{color:C.textMuted,font:{size:11}},grid:{color:C.border}},y:{ticks:{color:C.textMuted,font:{size:10}},grid:{color:C.border}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return h("canvas",{ref,style:{height:220}});
}
function DonutChartComp({data}){
  const ref=useRef();const chartRef=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(chartRef.current)chartRef.current.destroy();
    chartRef.current=new Chart(ref.current,{type:"doughnut",data:{labels:data.map(d=>d.cluster),datasets:[{data:data.map(d=>d.count),backgroundColor:data.map(d=>riskCol(d.risk)+"cc"),borderColor:data.map(d=>riskCol(d.risk)),borderWidth:2,hoverOffset:10}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{color:C.textSecondary,padding:12,font:{size:11}}},tooltip:{backgroundColor:C.surface,borderColor:C.border,borderWidth:1,titleColor:C.textPrimary,bodyColor:C.textSecondary,callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed.toLocaleString()} (${data[ctx.dataIndex].pct}%)`}}}}});
    return()=>{if(chartRef.current)chartRef.current.destroy();};
  },[data]);
  return h("canvas",{ref,style:{height:260}});
}

// ── SVG Risk Map ─────────────────────────────────────────────────────────────
function RiskMap({points,zones,filter}){
  const [hov,setHov]=useState(null);
  const W=640,H=360,pad=36;
  const vis=useMemo(()=>{const f=filter==="All"?"All":filter;return{pts:f==="All"?points:points.filter(p=>p.risk.toLowerCase().includes(f.toLowerCase())),zns:f==="All"?zones:zones.filter(z=>z.risk.toLowerCase().includes(f.toLowerCase()))};
  },[points,zones,filter]);
  const lats=points.map(p=>p.lat),lons=points.map(p=>p.lon);
  const minLat=Math.min(...lats),maxLat=Math.max(...lats),minLon=Math.min(...lons),maxLon=Math.max(...lons);
  const px=lon=>pad+((lon-minLon)/(maxLon-minLon||1))*(W-pad*2);
  const py=lat=>(H-pad)-((lat-minLat)/(maxLat-minLat||1))*(H-pad*2);
  const heat=useMemo(()=>{const COLS=18,ROWS=11,grid=Array.from({length:ROWS},()=>Array(COLS).fill(0));vis.pts.forEach(pt=>{const c=Math.floor(((pt.lon-minLon)/(maxLon-minLon||1))*(COLS-1)),r=ROWS-1-Math.floor(((pt.lat-minLat)/(maxLat-minLat||1))*(ROWS-1));if(c>=0&&c<COLS&&r>=0&&r<ROWS)grid[r][c]++;});const mv=Math.max(...grid.flat(),1);return{grid,mv,COLS,ROWS};},[vis.pts,minLat,maxLat,minLon,maxLon]);
  
  return h("div",{style:{position:"relative",overflowX:"auto"}},[
    h("svg",{width:W,height:H,style:{position:"absolute",top:0,left:0,pointerEvents:"none"}},
      heat.grid.flatMap((row,r)=>row.map((v,c)=>{const i=v/heat.mv;if(i<0.06)return null;const cW=(W-pad*2)/heat.COLS,cH=(H-pad*2)/heat.ROWS,x=pad+c*cW,y=pad+r*cH,col=i>.65?C.red:i>.3?C.amber:C.accent;return h("rect",{key:`h${r}-${c}`,x,y,width:cW,height:cH,fill:col,opacity:i*.38,rx:2});})).filter(Boolean)
    ),
    h("svg",{width:W,height:H,style:{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,display:"block"}},[
      ...[.25,.5,.75].map(t=>h("g",{key:t},[
        h("line",{x1:pad,y1:pad+t*(H-pad*2),x2:W-pad,y2:pad+t*(H-pad*2),stroke:C.border,strokeWidth:.5}),
        h("line",{x1:pad+t*(W-pad*2),y1:pad,x2:pad+t*(W-pad*2),y2:H-pad,stroke:C.border,strokeWidth:.5}),
      ])),
      ...vis.pts.filter((_,i)=>i%4===0).map((pt,i)=>h("circle",{key:`d${i}`,cx:px(pt.lon),cy:py(pt.lat),r:2.5,fill:riskCol(pt.risk),opacity:.5})),
      ...vis.zns.map((z,i)=>{const x=px(z.lon),y=py(z.lat),col=riskCol(z.risk),isH=hov===z.id;
        return h("g",{key:`z${i}`,style:{cursor:"pointer"},onMouseEnter:()=>setHov(z.id),onMouseLeave:()=>setHov(null)},[
          isH&&h("circle",{cx:x,cy:y,r:20,fill:"none",stroke:col,strokeWidth:1,opacity:.35}),
          h("circle",{cx:x,cy:y,r:isH?12:8,fill:col,opacity:.9,style:{filter:`drop-shadow(0 0 8px ${col})`,transition:"r .15s"}}),
          h("text",{x,y:y+1,textAnchor:"middle",dominantBaseline:"middle",fontSize:7,fontWeight:700,fill:C.bg},z.incidents>999?"1k+":z.incidents),
          isH&&h("g",{},[
            h("rect",{x:x+14,y:y-24,width:130,height:38,rx:5,fill:C.card,stroke:col,strokeWidth:1}),
            h("text",{x:x+20,y:y-10,fontSize:9,fontWeight:700,fill:C.textPrimary},z.zone),
            h("text",{x:x+20,y:y+2,fontSize:8,fill:col},`${z.risk} · ${z.incidents.toLocaleString()}`),
          ]),
        ].filter(Boolean));
      }),
      h("text",{x:W/2,y:H-5,textAnchor:"middle",fontSize:9,fill:C.textMuted},"Longitude"),
      h("text",{x:9,y:H/2,textAnchor:"middle",fontSize:9,fill:C.textMuted,transform:`rotate(-90,9,${H/2})`},"Latitude"),
    ]),
    h("div",{style:{position:"absolute",top:10,right:10,background:C.card+"ee",border:`1px solid ${C.border}`,borderRadius:8,padding:"8px 12px"}},[
      ...["High","Medium","Low"].map(r=>div({key:r,style:{display:"flex",alignItems:"center",gap:6,fontSize:10,color:C.textSecondary,fontFamily:"'Space Mono',monospace",marginBottom:3}},[
        div({style:{width:7,height:7,borderRadius:"50%",background:riskCol(r)}}),r
      ]))
    ]),
  ]);
}

// ── Cluster SVG Map ──────────────────────────────────────────────────────────
function ClusterMap({hotspots}){
  const [hov,setHov]=useState(null);
  const W=440,H=250,pad=36;
  const lats=hotspots.map(h=>h.lat),lons=hotspots.map(h=>h.lon);
  const minLat=Math.min(...lats)-.025,maxLat=Math.max(...lats)+.025,minLon=Math.min(...lons)-.025,maxLon=Math.max(...lons)+.025;
  const px=lon=>pad+((lon-minLon)/(maxLon-minLon))*(W-pad*2);
  const py=lat=>(H-pad)-((lat-minLat)/(maxLat-minLat))*(H-pad*2);
  const mx=Math.max(...hotspots.map(h=>h.count));
  return h("svg",{width:"100%",viewBox:`0 0 ${W} ${H}`,style:{background:C.surface,borderRadius:10,border:`1px solid ${C.border}`,display:"block"}},[
    ...[.25,.5,.75].map(t=>h("g",{key:t},[h("line",{x1:pad,y1:pad+t*(H-pad*2),x2:W-pad,y2:pad+t*(H-pad*2),stroke:C.border,strokeWidth:.5}),h("line",{x1:pad+t*(W-pad*2),y1:pad,x2:pad+t*(W-pad*2),y2:H-pad,stroke:C.border,strokeWidth:.5})])),

        div({key:key,style:{background:C.card,border:`1px solid ${C.border}`,borderTop:`2px solid ${col}`,borderRadius:10,padding:"14px 16px",textAlign:"center"}},[
          span({style:{fontSize:18,display:"block",marginBottom:5}},[em]),
          span({className:"mono",style:{fontSize:22,fontWeight:700,color:col,display:"block"}},[h(AnimNum,{key:key,target:zones.filter(z=>z.risk.toLowerCase().includes(key)).reduce((s,z)=>s+z.incidents,0)})]),
          span({style:{fontSize:11,color:C.textSecondary,display:"block",marginTop:3}},[label+" incidents"]),
        ])
      )
    ]),
  ]);}

  function renderHotspots(){return div({style:{display:"flex",flexDirection:"column",gap:16}},[
    div({className:"grid4"},[
      ...hot.map((ht,i)=>{const col=riskCol(ht.risk);return div({key:i,className:"card",style:{"--c":col,"--glow":col+"12",borderTop:`2px solid ${col}`,padding:"16px 18px"}},[
        span({className:"mono",style:{fontSize:8,color:C.textMuted,letterSpacing:".15em",display:"block",marginBottom:4}},[ht.cluster.toUpperCase()]),
        span({className:"mono",style:{fontSize:22,fontWeight:700,color:col,lineHeight:1,display:"block"}},[ht.count.toLocaleString()]),
        span({style:{fontSize:10,color:C.textSecondary,display:"block",margin:"3px 0 7px"}},["incidents"]),
        div({style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},[
          span({className:"mono",style:{fontSize:12,fontWeight:700,color:col}},[`${ht.pct}%`]),
          h(RiskBadge,{level:ht.risk}),
        ]),
        div({style:{height:3,background:C.border,borderRadius:2,marginTop:9}},[div({style:{height:"100%",borderRadius:2,background:col,width:`${ht.pct}%`,transition:"width .8s ease"}})]),
      ]);})
    ]),
    div({style:{display:"grid",gridTemplateColumns:"1fr 1.5fr",gap:14}},[
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"Crime Share Distribution",sub:"By KMeans cluster"}),
        h(DonutChartComp,{data:hot}),
      ]),
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"Cluster Centroid Map",sub:"Bubble size = incident count · Hover for details"}),
        h(ClusterMap,{hotspots:hot}),
        div({style:{marginTop:10,padding:"8px 12px",background:C.accent+"08",border:`1px solid ${C.border}`,borderRadius:7,fontSize:11,color:C.textSecondary}},["ℹ️ Centroids from KMeans model. Each cluster represents a geographic crime hotspot from 1.45M records."]),
      ]),
    ]),
    div({className:"card",style:{padding:"20px 22px"}},[
      h(SectionTitle,{title:"Cluster Detail Table",sub:"From hotspot_summary.csv"}),
      h("table",{},[
        h("thead",{},[h("tr",{},[...["#","Cluster","Incidents","Share","Risk Level","Lat","Lon"].map(hd=>h("th",{key:hd},[hd]))])]),
        h("tbody",{},[...hot.map((ht,i)=>{const col=riskCol(ht.risk);return h("tr",{key:i},[
          h("td",{style:{color:C.textMuted,fontFamily:"'Space Mono',monospace"}},[ht.sr]),
          h("td",{style:{color:C.textPrimary,fontWeight:600}},[ht.cluster]),
          h("td",{style:{color:col,fontFamily:"'Space Mono',monospace",fontWeight:700}},[ht.count.toLocaleString()]),
          h("td",{},[div({style:{display:"flex",alignItems:"center",gap:7}},[div({style:{flex:1,height:4,background:C.border,borderRadius:2}},[div({style:{height:"100%",width:`${ht.pct}%`,background:col,borderRadius:2}})]),span({className:"mono",style:{color:col,fontSize:10,width:34}},[`${ht.pct}%`])])]),
          h("td",{},[h(RiskBadge,{level:ht.risk})]),
          h("td",{style:{color:C.textSecondary,fontFamily:"'Space Mono',monospace",fontSize:10}},[ht.lat.toFixed(4)]),
          h("td",{style:{color:C.textSecondary,fontFamily:"'Space Mono',monospace",fontSize:10}},[ht.lon.toFixed(4)]),
        ]);})]),
      ]),
    ]),
  ]);}

  function renderModel(){return div({style:{display:"flex",flexDirection:"column",gap:16}},[
    div({className:"grid4"},[
      ...MODEL_DATA.map((m,i)=>{const best=m.model==="Random Forest";return div({key:i,className:"card",style:{"--glow":m.color+"12",borderTop:`2px solid ${m.color}`,padding:"16px 18px",outline:best?`2px solid ${m.color}40`:"none"}},[
        best&&span({className:"mono",style:{fontSize:8,color:m.color,letterSpacing:".15em",display:"block",marginBottom:4}},["✅ PRODUCTION MODEL"]),
        div({style:{fontSize:12,fontWeight:700,color:C.textPrimary,marginBottom:2}},[m.model]),
        div({style:{fontSize:9,color:C.textMuted,marginBottom:8}},[m.type]),
        span({className:"mono",style:{fontSize:24,fontWeight:700,color:m.color,lineHeight:1,display:"block"}},[m.rmse]),
        div({style:{fontSize:9,color:C.textMuted,marginTop:3}},["RMSE"]),
        div({style:{height:3,background:C.border,borderRadius:2,marginTop:8}},[div({style:{height:"100%",borderRadius:2,width:`${(1-(m.rmse/160))*100}%`,background:m.color,transition:"width .8s ease"}})]),
      ]);})
    ]),
    div({className:"grid2"},[
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"RMSE Comparison",sub:"Lower = better accuracy"}),
        h(BarChartComp,{data:MODEL_DATA}),
        div({style:{marginTop:10,padding:"8px 12px",background:C.accent+"08",border:`1px solid ${C.border}`,borderRadius:7,fontSize:11,color:C.textSecondary}},["💡 Random Forest achieved ",h("strong",{style:{color:C.accent}},["55% lower RMSE"])," than ARIMA."]),
      ]),
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"Feature Importance",sub:"Random Forest — what matters most"}),
        div({style:{display:"flex",flexDirection:"column",gap:10,marginTop:4}},[
          ...FEAT.map((f,i)=>div({key:i},[
            div({style:{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}},[span({style:{color:C.textSecondary}},[f.label]),span({className:"mono",style:{color:C.accent,fontWeight:700}},[`${f.v}%`])]),
            div({style:{height:5,background:C.border,borderRadius:3}},[div({style:{height:"100%",borderRadius:3,width:`${f.v}%`,background:`linear-gradient(90deg,${C.accent},${C.blue})`,transition:"width .9s ease"}})]),
          ]))
        ]),
      ]),
    ]),
    div({className:"grid2"},[
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"Production Model Config"}),
        ...[["Algorithm","Random Forest Regressor"],["File","final_forecast_model.pkl"],["Size","8.4 MB"],["RMSE","48.31"],["Lag Features","1d / 7d / 30d"],["Rolling","7-day & 30-day mean"],["Temporal","Month + Weekday"],["Type","Iterative multi-step"]].map(([k,v],i)=>
          div({key:i,style:{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:i<7?`1px solid ${C.border}`:0,fontSize:11}},[span({style:{color:C.textMuted}},[k]),span({className:"mono",style:{color:C.textPrimary,fontWeight:600,fontSize:10}},[v])])
        ),
      ]),
      div({className:"card",style:{padding:"20px 22px"}},[
        h(SectionTitle,{title:"Key Findings"}),
        div({style:{display:"flex",flexDirection:"column",gap:9}},[
          ...[
            {icon:"🎯",col:C.accent,text:"Random Forest cut forecasting error by 55% vs the ARIMA baseline."},
            {icon:"📊",col:C.blue,text:"7-day rolling mean is the top predictor at 34% importance — weekly rhythm is highly predictive."},
            {icon:"📉",col:C.amber,text:"Stable residuals across validation confirm strong generalization — no overfitting."},
            {icon:"🗺",col:C.red,text:"Cluster 3 (High Risk) contributes 27.4% of all 192,642 total incidents."},
            {icon:"📅",col:C.purple,text:"Weekday + month encoding captures seasonal patterns that pure lag features miss."},
          ].map((item,i)=>div({key:i,style:{display:"flex",gap:10,padding:"10px 12px",background:item.col+"07",border:`1px solid ${item.col}20`,borderRadius:7,fontSize:11,color:C.textSecondary}},[span({style:{fontSize:14,flexShrink:0}},[item.icon]),span({style:{lineHeight:1.6}},[item.text])]))
        ]),
      ]),
    ]),
  ]);}
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
</body>
</html>
